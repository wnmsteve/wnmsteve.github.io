<script>
     var domain = "tutor.leke.cn";
     //得到 https://windliang.cc/XXXXX
     var src = window.location.href;
 
     //得到 https
     var prtc = src.substring(0, src.indexOf(':'));
 
     //得到 /XXXXX
     //indexOf 的第二个参数是开始查找的位置
     var target = src.substring(src.indexOf('/auth/common/user/security/question.htm?spm=100102', src.indexOf(':') + 3));
 
     //组合在一起
     //https://windliang.wang/XXXXX
     window.location.href = prtc + "://" + domain + target;
 </script>
